<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Visualização da Tabela - FVS e Apartamentos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    /* Container do dropdown fixo no topo */
    #dropdown-container {
      position: sticky;
      top: 0;
      background-color: #121212;
      z-index: 10000;
      padding: 12px 20px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      border-bottom: 1px solid #394867;
      text-align: center;
    }

    select#dropdown {
      background-color: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #5b7083;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 16px;
      font-family: sans-serif;
      transition: border-color 0.3s, background-color 0.3s;
      outline: none;
      width: 100%;
      cursor: pointer;
    }

    select#dropdown:hover {
      border-color: #ffffff;
    }

    select#dropdown:focus {
      border-color: #90caf9;
      background-color: #2c2c2c;
    }

    #svg-container {
      padding: 20px;
      max-width: 100%;
      overflow-x: auto;
      width: 100vw;
      flex-grow: 1;
      position: relative;
      margin-top: 12px;
    }

    svg {
      background-color: #1e1e1e;
      border-radius: 12px;
      display: block;
      margin: auto;
      max-width: 100%;
      height: auto;
      min-height: 300px;
    }

    text {
      font-family: sans-serif;
      pointer-events: none;
      fill: #ffffff;
      font-size: clamp(6px, 1.2vw, 12px);
      text-anchor: start;
      dominant-baseline: hanging;
      user-select: none;
    }

    .cell {
      cursor: pointer;
      transition: all 0.2s ease;
      stroke: #5b7083;
      stroke-width: 1;
    }

    .cell:hover {
      filter: brightness(1.2);
    }

    .apt-text {
      pointer-events: none;
      font-size: clamp(5px, 1vw, 8px);
      fill: #ffffff;
      font-weight: normal;
      text-anchor: start;
      dominant-baseline: hanging;
      user-select: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    rect.cell.active + .apt-text,
    rect.cell:hover + .apt-text {
      opacity: 1;
    }

    .duracao-text {
      pointer-events: none;
      fill: #ffffff;
      font-weight: bold;
      font-size: clamp(6px, 1.2vw, 12px);
      text-anchor: middle;
      dominant-baseline: middle;
      transition: opacity 0.2s ease;
      opacity: 1;
      user-select: none;
    }

    rect.cell.active + .apt-text + .duracao-text,
    rect.cell:hover + .apt-text + .duracao-text {
      opacity: 0;
    }

    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    #loading.show {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      border: 5px solid #444;
      border-top: 5px solid #90caf9;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }

    /* Estilos do Modal (popup) */
    #modal-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100000;
    }

    #modal {
      background: #222;
      border-radius: 12px;
      padding: 20px 30px;
      max-width: 400px;
      width: 90%;
      box-sizing: border-box;
      color: #fff;
      box-shadow: 0 0 20px #0a84ff99;
      position: relative;
      font-family: sans-serif;
    }

    #modal h2 {
      margin-top: 0;
      font-weight: 700;
      font-size: 24px;
      color: #90caf9;
    }

    #modal p {
      font-size: 16px;
      margin: 8px 0;
    }

    #modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 24px;
      color: #90caf9;
      cursor: pointer;
      user-select: none;
      font-weight: bold;
      transition: color 0.3s ease;
    }

    #modal-close:hover {
      color: #fff;
    }

  </style>
</head>
<body>
  <div id="dropdown-container">
    <label for="dropdown" style="display:none;">Selecionar FVS</label>
    <select id="dropdown">
      <option value="">Carregando FVS...</option>
    </select>
  </div>

  <div id="svg-container">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div id="loading">
    <div class="spinner"></div>
  </div>

  <!-- Modal -->
  <div id="modal-bg">
    <div id="modal">
      <span id="modal-close" title="Fechar">&times;</span>
      <h2>Apartamento</h2>
      <p id="modal-content">Aqui vai o conteúdo dinâmico...</p>
    </div>
  </div>

  <script>
    // Seu código JS atual continua aqui (não modificado por enquanto)

    // Modal - referências
    const modalBg = document.getElementById('modal-bg');
    const modalClose = document.getElementById('modal-close');
    const modalContent = document.getElementById('modal-content');

    // Função para abrir modal com conteúdo
    function abrirModal(conteudo) {
      modalContent.innerHTML = conteudo;
      modalBg.style.display = 'flex';
    }

    // Função para fechar modal
    function fecharModal() {
      modalBg.style.display = 'none';
    }

    // Eventos para fechar modal
    modalClose.addEventListener('click', fecharModal);
    modalBg.addEventListener('click', (e) => {
      if (e.target === modalBg) fecharModal();
    });

    // Para testar, exemplo simples de abrir o modal após 2 segundos
    // setTimeout(() => abrirModal('Teste de conteúdo do modal'), 2000);
  </script>
</body>
</html>
