<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Visualização da Tabela - FVS e Apartamentos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    #dropdown-container {
      position: sticky;
      top: 0;
      background-color: #121212;
      z-index: 10000;
      padding: 12px 20px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      border-bottom: 1px solid #394867;
      text-align: center;
    }

    select#dropdown {
      background-color: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #5b7083;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 16px;
      font-family: sans-serif;
      transition: border-color 0.3s, background-color 0.3s;
      outline: none;
      width: 100%;
      cursor: pointer;
    }

    select#dropdown:hover {
      border-color: #ffffff;
    }

    select#dropdown:focus {
      border-color: #90caf9;
      background-color: #2c2c2c;
    }

    #svg-container {
      padding: 20px;
      max-width: 100%;
      overflow-x: auto;
      width: 100vw;
      flex-grow: 1;
      position: relative;
      margin-top: 12px;
    }

    svg {
      background-color: #1e1e1e;
      border-radius: 12px;
      display: block;
      margin: auto;
      max-width: 100%;
      height: auto;
      min-height: 300px;
    }

    text {
      font-family: sans-serif;
      pointer-events: none;
      fill: #ffffff;
      font-size: clamp(6px, 1.2vw, 12px);
      text-anchor: start;
      dominant-baseline: hanging;
      user-select: none;
    }

    .cell {
      cursor: pointer;
      transition: all 0.2s ease;
      stroke: #5b7083;
      stroke-width: 1;
    }

    .cell:hover {
      filter: brightness(1.2);
    }

    /* Hover específico para célula verde */
    .cell.green:hover {
      filter: brightness(1.5);
    }

    .apt-text {
      pointer-events: none;
      font-size: clamp(5px, 1vw, 8px);
      fill: #ffffff;
      font-weight: normal;
      text-anchor: start;
      dominant-baseline: hanging;
      user-select: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    rect.cell.active + .apt-text,
    rect.cell:hover + .apt-text {
      opacity: 1;
    }

    .duracao-text {
      pointer-events: none;
      fill: #ffffff;
      font-weight: bold;
      font-size: clamp(6px, 1.2vw, 12px);
      text-anchor: middle;
      dominant-baseline: middle;
      transition: opacity 0.2s ease;
      opacity: 1;
      user-select: none;
    }

    rect.cell.active + .apt-text + .duracao-text,
    rect.cell:hover + .apt-text + .duracao-text {
      opacity: 0;
    }

    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    #loading.show {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      border: 5px solid #444;
      border-top: 5px solid #90caf9;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }

    #modal-backdrop {
      position: fixed;
      top:0; left:0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100000;
    }

    #modal {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 20px 30px;
      max-width: 320px;
      width: 90%;
      color: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
      position: relative;
      font-size: 16px;
    }

    #modal h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 22px;
      text-align: center;
    }

    #modal p {
      margin: 8px 0;
    }

    #modal button.close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: transparent;
      border: none;
      color: white;
      font-size: 26px;
      cursor: pointer;
      font-weight: 700;
      line-height: 1;
      padding: 0;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="dropdown-container">
    <label for="dropdown" style="display:none;">Selecionar FVS</label>
    <select id="dropdown">
      <option value="">Carregando FVS...</option>
    </select>
  </div>

  <div id="svg-container">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div id="loading">
    <div class="spinner"></div>
  </div>

  <div id="modal-backdrop" tabindex="-1" aria-hidden="true">
    <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="0">
      <button class="close-btn" aria-label="Fechar modal">&times;</button>
      <h2 id="modal-title">Detalhes do Apartamento</h2>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://script.google.com/macros/s/AKfycbyQiJpxajuC0alNhKwiyzLH5nldPlQoe4SR8vE-CXE8IvmQNDKJLHrRFeQQkl6gD24e/exec';
    const ESTRUTURA_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYGuSxR-9vY5Uj7tIDEZXtyCaTLPuyklhHrBQEv0o1YdhLb_XYKazJnZDFpBfgmoHgqYq_Lbe1QWju/pub?output=csv';

    const CELL_WIDTH = 50;
    const CELL_HEIGHT = 30;

    const loadingDiv = document.getElementById('loading');
    const modalBackdrop = document.getElementById('modal-backdrop');
    const modalContent = document.getElementById('modal-content');
    const modalCloseBtn = document.querySelector('#modal button.close-btn');

    const cache = {
      fvsList: null,
      duracoes: {},
      estruturaCsv: null,
    };

    function showLoading() {
      loadingDiv.classList.add('show');
    }

    function hideLoading() {
      loadingDiv.classList.remove('show');
    }

    async function loadCSV(url) {
      if(cache.estruturaCsv) return cache.estruturaCsv;
      const res = await fetch(url);
      if(!res.ok) throw new Error(`HTTP status ${res.status}`);
      const text = await res.text();
      const lines = text.trim().split('\n');
      const data = lines.map(line => line.split(',').map(cell => cell.trim()));
      cache.estruturaCsv = data;
      return data;
    }

    function expandRow(row) {
      let lastValue = "";
      return row.map(cell => {
        if(cell) lastValue = cell;
        return lastValue;
      });
    }

    function groupCells(grid) {
      const visited = Array.from({ length: grid.length }, () =>
        Array(grid[0].length).fill(false)
      );

      const groups = [];
      const rows = grid.length;
      const cols = grid[0].length;

      const directions = [[0, 1], [1, 0], [-1, 0], [0, -1]];

      function bfs(r, c, value) {
        const queue = [[r, c]];
        const group = [];

        while(queue.length > 0) {
          const [x, y] = queue.shift();
          if(x < 0 || x >= rows || y < 0 || y >= cols || visited[x][y] || grid[x][y] !== value) continue;
          visited[x][y] = true;
          group.push([x, y]);
          for(const [dx, dy] of directions) {
            queue.push([x + dx, y + dy]);
          }
        }
        return group;
      }

      for(let r = 0; r < rows; r++) {
        for(let c = 0; c < cols; c++) {
          const cellValue = grid[r][c];
          if(!visited[r][c] && cellValue && cellValue.toLowerCase() !== "vazio") {
            const group = bfs(r, c, cellValue);
            groups.push({value: cellValue, cells: group});
          }
        }
      }
      return groups;
    }

    function formatDateBR(dateStr) {
      if(!dateStr) return "";
      const d = (dateStr instanceof Date) ? dateStr : new Date(dateStr);
      if (isNaN(d)) return dateStr;
      const dd = String(d.getDate()).padStart(2,'0');
      const mm = String(d.getMonth() + 1).padStart(2,'0');
      const yyyy = d.getFullYear();
      return `${dd}/${mm}/${yyyy}`;
    }

    function draw(groups, duracoesMap, fvsSelecionada) {
      const svg = document.getElementById('svg');
      svg.innerHTML = '';

      const getBounds = (cells) => {
        let minRow = Infinity, minCol = Infinity, maxRow = -1, maxCol = -1;
        for(const [r, c] of cells) {
          if(r < minRow) minRow = r;
          if(c < minCol) minCol = c;
          if(r > maxRow) maxRow = r;
          if(c > maxCol) maxCol = c;
        }
        return {minRow, minCol, maxRow, maxCol};
      };

      let maxWidth = 0;
      let maxHeight = 0;

      groups.forEach(group => {
        if(group.value.toLowerCase() === 'vazio') return;

        const {value, cells} = group;
        const {minRow, minCol, maxRow, maxCol} = getBounds(cells);

        const x = minCol * CELL_WIDTH;
        const y = minRow * CELL_HEIGHT;
        const width = (maxCol - minCol + 1) * CELL_WIDTH;
        const height = (maxRow - minRow + 1) * CELL_HEIGHT;

        if (x + width > maxWidth) maxWidth = x + width;
        if (y + height > maxHeight) maxHeight = y + height;

        const data = duracoesMap[value];
        let fillColor = '#666666'; // cinza padrão
        let textoCentro = '';

        if(data) {
          const maxNum = Number(data.maxAC);
          if (maxNum === 100) {
            fillColor = '#28a745'; // verde para 100%
          } else {
            fillColor = '#394867'; // azul escuro para os demais
          }
          textoCentro = `${data.duracao}`;
        }

        const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
        rect.setAttribute("x", x);
        rect.setAttribute("y", y);
        rect.setAttribute("width", width);
        rect.setAttribute("height", height);
        rect.setAttribute("fill", fillColor);
        rect.setAttribute("class", "cell");
        if (data && Number(data.maxAC) === 100) {
          rect.classList.add('green');
        }
        rect.style.cursor = "pointer";
        svg.appendChild(rect);

        const aptText = document.createElementNS("http://www.w3.org/2000/svg","text");
        aptText.setAttribute("x", x + 3);
        aptText.setAttribute("y", y + 3);
        aptText.setAttribute("class", "apt-text");
        aptText.textContent = value;
        svg.appendChild(aptText);

        const duracaoText = document.createElementNS("http://www.w3.org/2000/svg","text");
        duracaoText.setAttribute("x", x + width / 2);
        duracaoText.setAttribute("y", y + height / 2);
        duracaoText.setAttribute("class", "duracao-text");
        duracaoText.textContent = textoCentro;
        svg.appendChild(duracaoText);

        rect.addEventListener('click', () => abrirModalDetalhes(value, fvsSelecionada));

        rect.addEventListener('mouseenter', () => {
          rect.classList.add('active');
        });
        rect.addEventListener('mouseleave', () => {
          rect.classList.remove('active');
        });
      });

      if (maxWidth === 0) maxWidth = CELL_WIDTH * 6;
      if (maxHeight === 0) maxHeight = CELL_HEIGHT * 6;

      svg.setAttribute('viewBox', `0 0 ${maxWidth} ${maxHeight}`);
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', 'auto');
    }

    async function abrirModalDetalhes(apartamento, fvsSelecionada) {
      modalContent.innerHTML = `<p>Carregando dados do apartamento ${apartamento}...</p>`;
      modalBackdrop.style.display = 'flex';

      try {
        const url = `${API_BASE}?tipo=apartamento&fvs=${encodeURIComponent(fvsSelecionada)}&apartamento=${encodeURIComponent(apartamento)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Erro ao buscar dados: ${res.statusText}`);

        const dados = await res.json();
        if (!dados || dados.length === 0) {
          modalContent.innerHTML = `<p>Sem dados para o apartamento ${apartamento}.</p>`;
          return;
        }

        const info = dados[0];
        const maxRaw = info.maxAC;
        const maxNum = (typeof maxRaw === 'number') ? maxRaw : (maxRaw ? Number(maxRaw) : null);

        let conteudoHtml = `<p><strong>Apartamento:</strong> ${info.apartamento}</p>`;
        const inicioFmt = formatDateBR(info.inicio);

        if (maxNum === 100) {
          const terminoFmt = formatDateBR(info.termino);
          conteudoHtml += `<p><strong>Início:</strong> ${inicioFmt}</p>`;
          if (info.termino) conteudoHtml += `<p><strong>Término:</strong> ${terminoFmt}</p>`;
          if (info.duracao !== undefined && info.duracao !== null && info.duracao !== "") {
            conteudoHtml += `<p><strong>Duração:</strong> ${info.duracao}</p>`;
          }
        } else {
          conteudoHtml += `<p><strong>Início:</strong> ${inicioFmt}</p>`;
          if (typeof maxNum === 'number') {
            const maxSemDecimais = Math.round(maxNum);
            conteudoHtml += `<p><strong>Conclusão:</strong> ${maxSemDecimais}%</p>`;
          } else {
            conteudoHtml += `<p><strong>Conclusão:</strong> -</p>`;
          }
          if (info.duracao !== undefined && info.duracao !== null && info.duracao !== "") {
            conteudoHtml += `<p><strong>Duração:</strong> ${info.duracao}</p>`;
          } else {
            conteudoHtml += `<p><strong>Duração:</strong> -</p>`;
          }
        }

        modalContent.innerHTML = conteudoHtml;

      } catch (err) {
        modalContent.innerHTML = `<p>Erro ao carregar dados: ${err.message}</p>`;
      }
    }

    function fecharModal() {
      modalBackdrop.style.display = 'none';
      modalContent.innerHTML = '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      carregarFvs();

      document.getElementById('dropdown').addEventListener('change', (e) => {
        const fvsSelecionada = e.target.value;
        carregarDuracoesEFazerDraw(fvsSelecionada);
      });

      modalCloseBtn.addEventListener('click', fecharModal);
      modalBackdrop.addEventListener('click', (e) => {
        if(e.target === modalBackdrop) fecharModal();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalBackdrop.style.display === 'flex') {
          fecharModal();
        }
      });

      carregarDuracoesEFazerDraw('');
    });

    async function carregarFvs() {
      const dropdown = document.getElementById('dropdown');
      dropdown.innerHTML = '<option value="">Carregando FVS...</option>';
      try {
        if(cache.fvsList) {
          preencherDropdown(cache.fvsList);
          return;
        }
        const res = await fetch(`${API_BASE}?tipo=fvs`);
        if (!res.ok) throw new Error(`HTTP status ${res.status}`);
        const fvsList = await res.json();
        cache.fvsList = fvsList;
        preencherDropdown(fvsList);
      } catch(e) {
        dropdown.innerHTML = '<option value="">Erro ao carregar FVS</option>';
        console.error('Erro ao carregar FVS:', e);
      }
    }

    function preencherDropdown(fvsList) {
      const dropdown = document.getElementById('dropdown');
      dropdown.innerHTML = '<option value="">-- Selecione uma FVS --</option>';
      for(const fvs of fvsList) {
        const opt = document.createElement('option');
        opt.value = fvs;
        opt.textContent = fvs;
        dropdown.appendChild(opt);
      }
    }

    async function carregarDuracoesEFazerDraw(fvsSelecionada) {
      showLoading();
      try {
        const rawGrid = await loadCSV(ESTRUTURA_CSV);
        const grid = rawGrid.map(row => expandRow(row.slice(1)));
        const groups = groupCells(grid);

        let duracoesMap = {};
        if(fvsSelecionada) {
          if(cache.duracoes[fvsSelecionada]) {
            duracoesMap = cache.duracoes[fvsSelecionada];
          } else {
            const res = await fetch(`${API_BASE}?tipo=apartamento&fvs=${encodeURIComponent(fvsSelecionada)}`);
            if(!res.ok) throw new Error(`HTTP status ${res.status}`);
            const dadosDuracoes = await res.json();
            duracoesMap = {};
            dadosDuracoes.forEach(({apartamento, duracao, maxAC}) => {
              duracoesMap[apartamento] = { duracao: duracao, maxAC: (typeof maxAC === 'number' ? maxAC : (maxAC ? Number(maxAC) : null)) };
            });
            cache.duracoes[fvsSelecionada] = duracoesMap;
          }
        }

        draw(groups, duracoesMap, fvsSelecionada);
      } catch(e) {
        const svg = document.getElementById('svg');
        svg.innerHTML = `<text x="10" y="20" fill="#fff">Erro: ${e.message}</text>`;
        console.error('Erro ao carregar dados ou estrutura:', e);
      } finally {
        hideLoading();
      }
    }
  </script>
</body>
</html>
