<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Visualização da Tabela</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: sans-serif;
    }

    #svg-container {
      padding: 20px;
      max-width: 100%;
      overflow-x: auto;
    }

    svg {
      background-color: #1e1e1e;
      border-radius: 12px;
      display: block;
      margin: auto;
    }

    text {
      font-family: sans-serif;
      pointer-events: none;
      fill: #ffffff;
      font-size: clamp(4px, 0.6vw, 8px);
      text-anchor: start;
      dominant-baseline: hanging;
      user-select: none;
    }

    .cell {
      cursor: pointer;
      transition: all 0.2s ease;
      stroke: #5b7083;
      stroke-width: 1;
    }

    .cell:hover {
      filter: brightness(1.2);
    }

    .apt-text {
      display: none;
      pointer-events: none;
      font-size: clamp(4px, 0.6vw, 8px);
      fill: #ffffff;
      font-weight: normal;
      text-anchor: start;
      dominant-baseline: hanging;
      user-select: none;
    }

    .cell:hover + .apt-text,
    .cell.active + .apt-text {
      display: block;
    }

    .duracao-text {
      pointer-events: none;
      fill: #ffffff;
      font-weight: bold;
      font-size: clamp(4px, 0.6vw, 8px);
      text-anchor: middle;
      dominant-baseline: middle;
      transition: opacity 0.2s ease;
      opacity: 1;
      user-select: none;
    }

    /* Classe para esconder duração individual */
    .duracao-hidden {
      opacity: 0 !important;
    }
  </style>
</head>
<body>
  <div id="svg-container">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <script>
    const CELL_WIDTH = 50;
    const CELL_HEIGHT = 30;

    const estruturaUrl = "https://cors-anywhere.herokuapp.com/https://docs.google.com/spreadsheets/d/e/2PACX-1vRYGuSxR-9vY5Uj7tIDEZXtyCaTLPuyklhHrBQEv0o1YdhLb_XYKazJnZDFpBfgmoHgqYq_Lbe1QWju/pub?output=csv";
    const detalhesUrl = "https://cors-anywhere.herokuapp.com/https://docs.google.com/spreadsheets/d/e/2PACX-1vRYGuSxR-9vY5Uj7tIDEZXtyCaTLPuyklhHrBQEv0o1YdhLb_XYKazJnZDFpBfgmoHgqYq_Lbe1QWju/pub?gid=1644638703&single=true&output=csv";

    async function loadCSV(url) {
      const res = await fetch(url);
      const text = await res.text();
      const lines = text.trim().split('\n');
      return lines.map(line => line.split(',').map(cell => cell.trim()));
    }

    async function getDicionarioDuracoes(url) {
      const rows = await loadCSV(url);
      const headers = rows[0];
      const idxApartamento = headers.indexOf("apartamentos");
      const idxDuracao = headers.indexOf("Duração");

      const mapa = {};
      for (let i = 1; i < rows.length; i++) {
        const apto = rows[i][idxApartamento];
        const duracao = rows[i][idxDuracao];
        if (apto) {
          mapa[apto] = duracao;
        }
      }
      return mapa;
    }

    function expandRow(row) {
      let newRow = [];
      let lastValue = "";
      for (let i = 0; i < row.length; i++) {
        if (row[i]) {
          lastValue = row[i];
          newRow.push(lastValue);
        } else {
          newRow.push(lastValue);
        }
      }
      return newRow;
    }

    function groupCells(grid) {
      const visited = Array.from({ length: grid.length }, () =>
        Array(grid[0].length).fill(false)
      );

      const groups = [];
      const rows = grid.length;
      const cols = grid[0].length;

      const directions = [
        [0, 1], [1, 0], [-1, 0], [0, -1]
      ];

      function bfs(r, c, value) {
        const queue = [[r, c]];
        const group = [];

        while (queue.length > 0) {
          const [x, y] = queue.shift();
          if (
            x < 0 || x >= rows || y < 0 || y >= cols ||
            visited[x][y] || grid[x][y] !== value
          ) continue;

          visited[x][y] = true;
          group.push([x, y]);

          for (const [dx, dy] of directions) {
            queue.push([x + dx, y + dy]);
          }
        }

        return group;
      }

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cellValue = grid[r][c];
          if (!visited[r][c] && cellValue && cellValue.toLowerCase() !== "vazio") {
            const group = bfs(r, c, cellValue);
            groups.push({ value: cellValue, cells: group });
          }
        }
      }

      return groups;
    }

    function draw(groups, duracoes) {
      const svg = document.getElementById("svg");
      svg.innerHTML = "";

      const getBounds = (cells) => {
        let minX = Infinity, minY = Infinity, maxX = -1, maxY = -1;
        for (const [r, c] of cells) {
          if (r < minX) minX = r;
          if (c < minY) minY = c;
          if (r > maxX) maxX = r;
          if (c > maxY) maxY = c;
        }
        return { minX, minY, maxX, maxY };
      };

      const fillColor = "#394867";

      groups.forEach(group => {
        if (group.value.toLowerCase() === "vazio") return;

        const { value, cells } = group;
        const { minX, minY, maxX, maxY } = getBounds(cells);

        const x = minY * CELL_WIDTH;
        const y = minX * CELL_HEIGHT;
        const width = (maxY - minY + 1) * CELL_WIDTH;
        const height = (maxX - minX + 1) * CELL_HEIGHT;

        // Retângulo
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", x);
        rect.setAttribute("y", y);
        rect.setAttribute("width", width);
        rect.setAttribute("height", height);
        rect.setAttribute("fill", fillColor);
        rect.setAttribute("class", "cell");
        svg.appendChild(rect);

        // Texto apartamento (invisível até hover ou clique)
        const textLeft = document.createElementNS("http://www.w3.org/2000/svg", "text");
        textLeft.setAttribute("x", x + 3);
        textLeft.setAttribute("y", y + 3);
        textLeft.setAttribute("class", "apt-text");
        textLeft.textContent = value;
        svg.appendChild(textLeft);

        // Texto duração centralizado vertical e horizontalmente
        let textRight;
        if (duracoes[value]) {
          textRight = document.createElementNS("http://www.w3.org/2000/svg", "text");
          textRight.setAttribute("x", x + width - width / 2);
          textRight.setAttribute("y", y + height / 2);
          textRight.setAttribute("class", "duracao-text");
          textRight.textContent = duracoes[value];
          svg.appendChild(textRight);
        }

        // Hover - mostrar apartamento e esconder duração só do grupo
        rect.addEventListener("mouseenter", () => {
          rect.classList.add("active");
          if (textRight) textRight.classList.add("duracao-hidden");
        });

        rect.addEventListener("mouseleave", () => {
          rect.classList.remove("active");
          if (textRight) textRight.classList.remove("duracao-hidden");
        });

        // Clique alterna "ativo" e duração escondida só no grupo clicado
        rect.addEventListener("click", () => {
          const currentlyActive = rect.classList.contains("active");
          document.querySelectorAll("rect.cell").forEach(r => r.classList.remove("active"));
          document.querySelectorAll(".duracao-text").forEach(t => t.classList.remove("duracao-hidden"));

          if (!currentlyActive) {
            rect.classList.add("active");
            if (textRight) textRight.classList.add("duracao-hidden");
          }
        });
      });

      const maxRow = groups.reduce((max, g) => Math.max(max, ...g.cells.map(([r]) => r)), 0);
      const maxCol = groups.reduce((max, g) => Math.max(max, ...g.cells.map(([, c]) => c)), 0);

      const svgWidth = CELL_WIDTH * (maxCol + 1);
      const svgHeight = CELL_HEIGHT * (maxRow + 1);

      svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);
      svg.setAttribute("width", "100%");
      svg.setAttribute("height", "auto");
    }

    async function init() {
      const rawGrid = await loadCSV(estruturaUrl);
      const grid = rawGrid.map(row => expandRow(row.slice(1)));
      const groups = groupCells(grid);
      const duracoes = await getDicionarioDuracoes(detalhesUrl);
      draw(groups, duracoes);
    }

    init();
  </script>
</body>
</html>
