<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Prédio 3D — viewer (cores herdadas da FVS)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <!-- CSS externo -->
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <!-- Canvas 3D + overlay 2D -->
  <div id="app">
    <div id="cards2d"></div>
  </div>

  <!-- Loading overlay -->
  <div id="doge-loading" role="status" aria-live="polite">Carregando dados…</div>

  <!-- Modal nativo (acessível) -->
  <div id="doge-modal-backdrop" aria-hidden="true">
    <div id="doge-modal" role="dialog" aria-modal="true" aria-labelledby="doge-modal-title">
      <header>
        <h3 id="doge-modal-title">Detalhes do Apartamento</h3>
        <span class="pill" id="doge-modal-pill"></span>
        <button class="close" id="doge-modal-close" type="button" aria-label="Fechar">✕</button>
      </header>
      <div class="content" id="doge-modal-content"></div>
    </div>
  </div>

  <!-- Tooltip global -->
  <div id="doge-tip" role="tooltip" aria-hidden="true"></div>

  <!-- HUD (rodapé) -->
  <div id="hud">
    <div class="row handle" id="hudHandle">
      <div class="grabber" aria-hidden="true"></div>
      <span class="title">Controles</span>
      <button id="hudToggle" aria-expanded="true" title="Recolher/Expandir">▾</button>
    </div>

    <div class="row" id="row-fvs">
      <label for="fvsSelect" title="Selecionar FVS">FVS</label>
      <select id="fvsSelect" aria-label="Selecionar FVS">
        <option value="">Carregando...</option>
      </select>
      <button id="btnNC" type="button" title="Mostrar apenas NC" aria-pressed="false">NC</button>
    </div>

    <div class="row">
      <button id="resetRot" title="Resetar rotação" aria-label="Resetar rotação">🔄</button>
      <button id="recenter" title="Recentrar câmera" aria-label="Recentrar câmera">🎯</button>
    </div>

    <div class="row">
      <label for="opacity" title="Opacidade">🌫️</label>
      <input id="opacity" type="range" min="0" max="100" value="100" />
    </div>

    <div class="row">
      <label for="explodeXY" title="Explodir XY">⤢</label>
      <input id="explodeXY" type="range" min="0" max="4" step="0.01" value="0" />
    </div>

    <div class="row">
      <label for="explodeY" title="Explodir por piso (Y)">⬆️</label>
      <input id="explodeY" type="range" min="0" max="1.5" step="0.01" value="0" />
      <button id="resetExplode" title="Resetar explode" aria-label="Resetar explode">Reset</button>
    </div>

    <div class="row">
      <button id="btn2D" class="mode2d" title="Alternar visualização 2D" aria-pressed="false">
        <svg viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <circle class="badge" cx="24" cy="24" r="20"></circle>
          <text class="label" x="24" y="29" text-anchor="middle">2D</text>
        </svg>
      </button>
    </div>
  </div>

  <!-- THREE core -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- App (módulos ES) -->
  <script type="module" src="./assets/js/viewer.js"></script>
</body>
</html>
