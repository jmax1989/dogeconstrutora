<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Visualização da Tabela - FVS e Apartamentos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    /* Container do dropdown fixo no topo */
    #dropdown-container {
      position: sticky;
      top: 0;
      background-color: #121212;
      z-index: 10000;
      padding: 12px 20px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      border-bottom: 1px solid #394867;
      text-align: center;
    }

    select#dropdown {
      background-color: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #5b7083;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 16px;
      font-family: sans-serif;
      transition: border-color 0.3s, background-color 0.3s;
      outline: none;
      width: 100%;
      cursor: pointer;
    }

    select#dropdown:hover {
      border-color: #ffffff;
    }

    select#dropdown:focus {
      border-color: #90caf9;
      background-color: #2c2c2c;
    }

    #svg-container {
      padding: 20px;
      max-width: 100%;
      overflow-x: auto;
      width: 100vw;
      flex-grow: 1;
      position: relative;
      margin-top: 12px;
    }

    svg {
      background-color: #1e1e1e;
      border-radius: 12px;
      display: block;
      margin: auto;
      max-width: 100%;
      max-height: 80vh; /* Limite de altura para não precisar scroll vertical excessivo */
      width: auto;
      height: auto;
    }

    text {
      font-family: sans-serif;
      pointer-events: none;
      fill: #ffffff;
      font-size: clamp(6px, 1.2vw, 12px);
      text-anchor: start;
      dominant-baseline: hanging;
      user-select: none;
    }

    .cell {
      cursor: pointer;
      transition: all 0.2s ease;
      stroke: #5b7083;
      stroke-width: 1;
    }

    .cell:hover {
      filter: brightness(1.2);
    }

    .apt-text {
      pointer-events: none;
      font-size: clamp(5px, 1vw, 8px);
      fill: #ffffff;
      font-weight: normal;
      text-anchor: start;
      dominant-baseline: hanging;
      user-select: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    rect.cell.active + .apt-text,
    rect.cell:hover + .apt-text {
      opacity: 1;
    }

    .duracao-text {
      pointer-events: none;
      fill: #ffffff;
      font-weight: bold;
      font-size: clamp(6px, 1.2vw, 12px);
      text-anchor: middle;
      dominant-baseline: middle;
      transition: opacity 0.2s ease;
      opacity: 1;
      user-select: none;
    }

    rect.cell.active + .apt-text + .duracao-text,
    rect.cell:hover + .apt-text + .duracao-text {
      opacity: 0;
    }

    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    #loading.show {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      border: 5px solid #444;
      border-top: 5px solid #90caf9;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
  </style>
</head>
<body>
  <div id="dropdown-container">
    <label for="dropdown" style="display:none;">Selecionar FVS</label>
    <select id="dropdown">
      <option value="">Carregando FVS...</option>
    </select>
  </div>

  <div id="svg-container">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div id="loading">
    <div class="spinner"></div>
  </div>

  <script>
    const API_BASE = 'https://script.google.com/macros/s/AKfycbyQiJpxajuC0alNhKwiyzLH5nldPlQoe4SR8vE-CXE8IvmQNDKJLHrRFeQQkl6gD24e/exec';
    const ESTRUTURA_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYGuSxR-9vY5Uj7tIDEZXtyCaTLPuyklhHrBQEv0o1YdhLb_XYKazJnZDFpBfgmoHgqYq_Lbe1QWju/pub?output=csv';

    const CELL_WIDTH = 50;
    const CELL_HEIGHT = 30;

    const loadingDiv = document.getElementById('loading');
    const svg = document.getElementById('svg');

    // Cache em memória
    const cache = {
      fvsList: null,
      duracoes: {},
      estruturaCsv: null,
    };

    // Guardar dimensões atuais para recalcular resize
    let lastGroups = null;
    let lastDuracoesMap = null;

    function showLoading() {
      loadingDiv.classList.add('show');
    }

    function hideLoading() {
      loadingDiv.classList.remove('show');
    }

    async function loadCSV(url) {
      if(cache.estruturaCsv) return cache.estruturaCsv;
      const res = await fetch(url);
      if(!res.ok) throw new Error(`HTTP status ${res.status}`);
      const text = await res.text();
      const lines = text.trim().split('\n');
      const data = lines.map(line => line.split(',').map(cell => cell.trim()));
      cache.estruturaCsv = data;
      return data;
    }

    function expandRow(row) {
      let lastValue = "";
      return row.map(cell => {
        if(cell) lastValue = cell;
        return lastValue;
      });
    }

    function groupCells(grid) {
      const visited = Array.from({ length: grid.length }, () =>
        Array(grid[0].length).fill(false)
      );

      const groups = [];
      const rows = grid.length;
      const cols = grid[0].length;

      const directions = [[0, 1], [1, 0], [-1, 0], [0, -1]];

      function bfs(r, c, value) {
        const queue = [[r, c]];
        const group = [];

        while(queue.length > 0) {
          const [x, y] = queue.shift();
          if(x < 0 || x >= rows || y < 0 || y >= cols || visited[x][y] || grid[x][y] !== value) continue;
          visited[x][y] = true;
          group.push([x, y]);
          for(const [dx, dy] of directions) {
            queue.push([x + dx, y + dy]);
          }
        }
        return group;
      }

      for(let r = 0; r < rows; r++) {
        for(let c = 0; c < cols; c++) {
          const cellValue = grid[r][c];
          if(!visited[r][c] && cellValue && cellValue.toLowerCase() !== "vazio") {
            const group = bfs(r, c, cellValue);
            groups.push({value: cellValue, cells: group});
          }
        }
      }
      return groups;
    }

    // Função para desenhar e ajustar tamanho responsivo
    function draw(groups, duracoesMap) {
      svg.innerHTML = '';

      const getBounds = (cells) => {
        let minX = Infinity, minY = Infinity, maxX = -1, maxY = -1;
        for(const [r, c] of cells) {
          if(r < minX) minX = r;
          if(c < minY) minY = c;
          if(r > maxX) maxX = r;
          if(c > maxY) maxY = c;
        }
        return {minX, minY, maxX, maxY};
      };

      let maxX = 0;
      let maxY = 0;

      groups.forEach(group => {
        if(group.value.toLowerCase() === 'vazio') return;

        const {value, cells} = group;
        const {minX, minY, maxX: gMaxX, maxY: gMaxY} = getBounds(cells);

        const x = minY * CELL_WIDTH;
        const y = minX * CELL_HEIGHT;
        const width = (gMaxY - minY + 1) * CELL_WIDTH;
        const height = (gMaxX - minX + 1) * CELL_HEIGHT;

        if (x + width > maxY) maxY = x + width;
        if (y + height > maxX) maxX = y + height;

        const fillColor = duracoesMap[value] ? '#394867' : '#666666';

        const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
        rect.setAttribute("x", x);
        rect.setAttribute("y", y);
        rect.setAttribute("width", width);
        rect.setAttribute("height", height);
        rect.setAttribute("fill", fillColor);
        rect.setAttribute("class", "cell");
        svg.appendChild(rect);

        const aptText = document.createElementNS("http://www.w3.org/2000/svg","text");
        aptText.setAttribute("x", x + 3);
        aptText.setAttribute("y", y + 3);
        aptText.setAttribute("class", "apt-text");
        aptText.textContent = value;
        svg.appendChild(aptText);

        const duracaoText = document.createElementNS("http://www.w3.org/2000/svg","text");
        duracaoText.setAttribute("x", x + width / 2);
        duracaoText.setAttribute("y", y + height / 2);
        duracaoText.setAttribute("class", "duracao-text");
        duracaoText.textContent = duracoesMap[value] || '';
        svg.appendChild(duracaoText);

        rect.addEventListener('mouseenter', () => {
          rect.classList.add('active');
        });
        rect.addEventListener('mouseleave', () => {
          rect.classList.remove('active');
        });
        rect.addEventListener('click', () => {
          const allRects = svg.querySelectorAll('rect.cell');
          const isActive = rect.classList.contains('active');
          allRects.forEach(r => r.classList.remove('active'));
          if(!isActive) {
            rect.classList.add('active');
          }
        });
      });

      // Guardar grupos e duracoes para resize
      lastGroups = groups;
      lastDuracoesMap = duracoesMap;

      ajustarSVGResponsivo(maxX, maxY);
    }

    // Ajusta o viewBox e tamanho do SVG para caber na tela responsivamente
    function ajustarSVGResponsivo(svgHeight, svgWidth) {
      // svgHeight e svgWidth são as dimensões totais calculadas (em px)

      const viewportWidth = window.innerWidth * 0.95; // 95% da largura da janela
      const viewportHeight = window.innerHeight * 0.8; // 80% da altura da janela

      const scaleX = viewportWidth / svgWidth;
      const scaleY = viewportHeight / svgHeight;
      const scale = Math.min(scaleX, scaleY, 1); // Não escala acima de 100%

      const viewBoxWidth = svgWidth / scale;
      const viewBoxHeight = svgHeight / scale;

      svg.setAttribute('viewBox', `0 0 ${viewBoxWidth} ${viewBoxHeight}`);

      svg.style.width = `${svgWidth * scale}px`;
      svg.style.height = `${svgHeight * scale}px`;
    }

    // Recalcula o desenho e ajuste ao redimensionar janela
    window.addEventListener('resize', () => {
      if (lastGroups && lastDuracoesMap) {
        // Recalcula SVG responsivo com dimensões antigas
        // As dimensões originais estavam invertidas: maxX = altura, maxY = largura
        // No draw(), maxX e maxY foram passados invertidos, ajustar aqui
        // Como passar certo aqui? Guardar com a ordem certa:
        // No draw(), última chamada: ajustarSVGResponsivo(maxX, maxY);
        // maxX = altura, maxY = largura
        ajustarSVGResponsivo(lastGroups.reduce((max, g) => Math.max(max, ...g.cells.map(c => c[0])), 0) * CELL_HEIGHT + CELL_HEIGHT,
                            lastGroups.reduce((max, g) => Math.max(max, ...g.cells.map(c => c[1])), 0) * CELL_WIDTH + CELL_WIDTH);
      }
    });

    async function carregarFvs() {
      const dropdown = document.getElementById('dropdown');
      dropdown.innerHTML = '<option value="">Carregando FVS...</option>';
      try {
        if(cache.fvsList) {
          preencherDropdown(cache.fvsList);
          return;
        }
        const res = await fetch(`${API_BASE}?tipo=fvs`);
        if (!res.ok) throw new Error(`HTTP status ${res.status}`);
        const fvsList = await res.json();
        cache.fvsList = fvsList;
        preencherDropdown(fvsList);
      } catch(e) {
        dropdown.innerHTML = '<option value="">Erro ao carregar FVS</option>';
        console.error('Erro ao carregar FVS:', e);
      }
    }

    function preencherDropdown(fvsList) {
      const dropdown = document.getElementById('dropdown');
      dropdown.innerHTML = '<option value="">-- Selecione uma FVS --</option>';
      fvsList.forEach(fvs => {
        const opt = document.createElement('option');
        opt.value = fvs;
        opt.textContent = fvs;
        dropdown.appendChild(opt);
      });
    }

    async function carregarDuracoesEFazerDraw(fvsSelecionada) {
      showLoading();
      try {
        const rawGrid = await loadCSV(ESTRUTURA_CSV);
        const grid = rawGrid.map(row => expandRow(row.slice(1)));
        const groups = groupCells(grid);

        let duracoesMap = {};
        if(fvsSelecionada) {
          if(cache.duracoes[fvsSelecionada]) {
            duracoesMap = cache.duracoes[fvsSelecionada];
          } else {
            const res = await fetch(`${API_BASE}?tipo=apartamento&fvs=${encodeURIComponent(fvsSelecionada)}`);
            if(!res.ok) throw new Error(`HTTP status ${res.status}`);
            const dadosDuracoes = await res.json();
            duracoesMap = {};
            dadosDuracoes.forEach(({apartamento, duracao}) => {
              duracoesMap[apartamento] = duracao;
            });
            cache.duracoes[fvsSelecionada] = duracoesMap;
          }
        }

        draw(groups, duracoesMap);
      } catch(e) {
        svg.innerHTML = `<text x="10" y="20" fill="#fff">Erro: ${e.message}</text>`;
        console.error('Erro ao carregar dados ou estrutura:', e);
      } finally {
        hideLoading();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      carregarFvs();
      document.getElementById('dropdown').addEventListener('change', (e) => {
        const fvsSelecionada = e.target.value;
        carregarDuracoesEFazerDraw(fvsSelecionada);
      });
      carregarDuracoesEFazerDraw('');
    });
  </script>
</body>
</html>
